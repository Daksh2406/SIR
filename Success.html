<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Success Wall</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#0f172a;
color:white;
}

/* HEADER */
header{
text-align:center;
padding:20px;
font-size:24px;
background:linear-gradient(90deg,#f59e0b,#facc15);
color:black;
}

/* CONTAINER */
.container{
width:95%;
max-width:1200px;
margin:auto;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px 0;
}

/* CARD */
.card{
background:#1e293b;
border-radius:15px;
overflow:hidden;
text-align:center;
transition:0.3s;
border:2px solid transparent;
position:relative;
}

.card:hover{
border:2px solid #facc15;
transform:translateY(-6px) scale(1.02);
}

/* IMAGE */
.card img{
width:100%;
height:220px;
object-fit:cover;
}

/* CONTENT */
.content{
padding:12px;
}

.content h3{
font-size:18px;
}

.content p{
font-size:14px;
color:#cbd5e1;
}

/* BADGE */
.badge{
position:absolute;
top:10px;
left:10px;
background:#facc15;
color:black;
padding:4px 10px;
border-radius:10px;
font-size:12px;
}

/* RESPONSIVE */
@media(max-width:600px){
.card img{height:180px;}
}

</style>
</head>

<body>

<header>🏆 Success Wall</header>

<div class="container">
<div class="grid" id="wall"></div>
</div>

<script>

let students = [
{ name:"Rahul Kumar", achievement:"SSC CGL Qualified", img:"img/s1.jpg" },
{ name:"Priya Sharma", achievement:"UPSC Prelims Clear", img:"img/s2.jpg" },
{ name:"Amit Verma", achievement:"Railway Selected", img:"img/s3.jpg" },
{ name:"Neha Singh", achievement:"Bank PO Selected", img:"img/s4.jpg" }
];

function showWall(){
let wall=document.getElementById("wall");
wall.innerHTML="";

students.forEach(s=>{
wall.innerHTML+=`
<div class="card">
<div class="badge">Topper</div>
<img src="${s.img}">
<div class="content">
<h3>${s.name}</h3>
<p>${s.achievement}</p>
</div>
</div>
`;
});
}

showWall();

</script>

</body>
</html>
