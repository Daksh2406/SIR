<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam | Sir Ambedkar Library</title>
    <link rel="icon" href="logo.png">
    <style>.exam-card{
    width:90%;
    max-width:1000px;
    margin:20px auto;
    background:#1e293b;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* 🔥 IMAGE FIX */
.exam-card img{
    width:100%;
    height:300px;
    object-fit:cover;   /* 👈 main fix */
    display:block;
}

/* CONTENT */
.exam-content{
    padding:20px;
    color:white;
}

.exam-content h2{
    margin-bottom:10px;
    font-size:22px;
}

.exam-content p{
    margin:5px 0;
    color:#cbd5e1;
}

/* BUTTON */
.btn{
    display:block;
    text-align:center;
    padding:12px;
    margin-top:15px;
    background:#22c55e;
    color:white;
    border-radius:10px;
    text-decoration:none;
    transition:0.3s;
}

.btn:hover{
    background:#16a34a;
    transform:scale(1.05);
}

/* 📱 RESPONSIVE */
@media(max-width:600px){
    .exam-card img{
        height:200px;
    }

    .exam-content h2{
        font-size:18px;
    }
}</style>
</head>
<body>
    <div class="exam-card">
    <img src="poster.jpeg" alt="Exam Poster">

    <div class="exam-content">
        <h2>Dr. B.R. Ambedkar Jayanti Examination 2026</h2>
        <p>Organized by: Sir Ambedkar Library, Abdullahpur Meerut</p>
        <p><b>Exam Date: 12 April 2026</b></p>

        <a href="https://docs.google.com/forms/d/e/1FAIpQLSfDVa7NG2vNAXqpxlyDrPnSRz00KoZ2XtE3zCtOEZLPaDo2Ug/viewform" class="btn">Enroll Now</a>
    </div>
</div>
</body>
</html>
